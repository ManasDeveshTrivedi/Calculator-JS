<body>

<div class="container">
    <div class="calculator">
        <input type="text" id="display" readonly>

        <div class="buttons">
           <button onclick="clearDisplay()" class="ac">AC</button>
            <button onclick="deleteLast()">DE</button>
            <button onclick="append('.')">.</button>
            <button onclick="append('/')">÷</button>
